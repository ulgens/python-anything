_subdirectory: template
_min_copier_version: "9.0.0"

_exclude:
  - "{% if license == 'None' %}LICENSE{% endif %}"

_tasks:
  - "uv lock"
  # TODO:
  #   Check for Windows
  #   https://github.com/ulgens/python-anything/pull/8#discussion_r2923211547
  - "git init -b main && git add . && prek run --all-files ; git add ."

_message_after_copy: |
  Your project "{{ project_name }}" has been created successfully!

  Next steps:

  1. Change directory to the project root:
     $ cd {{ _copier_conf.dst_path }}

  2. Install git hooks (requires prek: https://prek.j178.dev/installation/):
     $ prek install

  3. Add a remote and make the initial commit:
     $ git remote add origin git@github.com:{{ github_username }}/{{ project_name }}.git
     $ git commit -m "Initial commit"
     $ git push -u origin main

  {%- if use_codecov %}

  4. Set up Codecov:
     - Sign up at https://about.codecov.io/ and add your repository.
     - Copy the upload token from Codecov's repository settings.
     - Add the token as a GitHub Actions secret named CODECOV_TOKEN
       in your repository settings (Settings > Secrets and variables > Actions).
  {%- endif %}

_message_after_update: |
  Your project "{{ project_name }}" has been updated successfully!
  In case there are any conflicts, please resolve them.

# ---- Questions ----

project_name:
  type: str
  help: "Project name"
  default: "my-awesome-project"

package_name:
  type: str
  default: "{{ project_name | lower | replace('-', '_') | replace(' ', '_') }}"
  when: false

project_description:
  type: str
  help: "Project description (one line)"
  default: ""

author_name:
  type: str
  help: "Author name"
  default: "Jane Doe"

author_email:
  type: str
  help: "Author email"
  default: "janedoe@example.com"

github_username:
  type: str
  help: "GitHub username or organization"
  default: "janedoe"

python_version:
  type: str
  help: "Python minor version"
  default: "3.14"

license:
  type: str
  help: "License"
  choices:
    - "MIT"
    - "BSD-3-Clause"
    - "Apache-2.0"
    - "GPL-3.0"
    - "None"
  default: "MIT"

frameworks:
  type: str
  help: "Frameworks & libraries to include (select none for a bare project)"
  multiselect: true
  choices:
    - "Click"
    - "FastAPI"
    - "LangChain"
  default: []

use_codecov:
  type: bool
  help: "Enable Codecov integration for test coverage reporting"
  default: true

use_ty:
  type: bool
  help: "Enable ty type checker (Astral)"
  default: false
