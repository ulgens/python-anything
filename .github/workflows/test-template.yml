name: "Test Template"

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request: ~

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # TODO: How to define a matrix without losing renovate support for the versions?
  # renovate: datasource=python-version depName=python
  PYTHON_VERSION: 3.14.4
  # renovate: datasource=pypi depName=uv
  UV_VERSION: 0.11.10

jobs:
  generate-project:
    name: Generate & validate project
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Install uv ${{ env.UV_VERSION }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          version: ${{ env.UV_VERSION }}

      - name: Install the dependencies
        run: uv sync --group ci

      - name: Generate project with defaults
        run: |
          uv run \
          copier copy --trust --defaults \
            --data project_name="Test Project" \
            --data author_name="Test Author" \
            --data author_email="test@example.com" \
            --data github_username=test-user \
            . /tmp/test-project

      - name: Verify generated project structure
        run: |
          test -f /tmp/test-project/pyproject.toml
          test -f /tmp/test-project/.pre-commit-config.yaml
          test -f /tmp/test-project/.gitignore
          test -f /tmp/test-project/renovate.json5
          test -f /tmp/test-project/ruff.toml
          test -d /tmp/test-project/src
          test -d /tmp/test-project/.github/workflows

      - name: Verify uv lock is valid
        working-directory: /tmp/test-project
        run: uv lock --check
